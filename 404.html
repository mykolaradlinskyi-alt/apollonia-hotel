<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сторінку не знайдено · Готель «Аполлонія»</title>
<meta name="robots" content="noindex,follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Onest:wght@400;500;600&display=swap" rel="stylesheet">
<meta name="theme-color" content="#C26A1A">
<style>
  :root{
    --saffron:#E8A82C; --saffron-deep:#C26A1A;
    --cream:#FAF5E8; --walnut:#3D2418;
    --charcoal:#1F1611; --muted:#8B7E70;
    --line:#E8DFC8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Onest',sans-serif;
    background:var(--cream);color:var(--walnut);
    min-height:100vh;display:flex;flex-direction:column;line-height:1.6;
  }
  header{padding:28px 40px;border-bottom:1px solid var(--line)}
  header a{
    text-decoration:none;color:var(--walnut);
    font-family:'Cormorant Garamond',serif;font-size:24px;
    letter-spacing:.08em;
  }
  header .tag{
    display:block;font-family:'Onest',sans-serif;
    font-size:10px;letter-spacing:.25em;text-transform:uppercase;
    color:var(--saffron-deep);margin-top:2px;font-weight:500;
  }
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 24px;text-align:center}
  .wrap{max-width:560px}
  .code{
    font-family:'Cormorant Garamond',serif;
    font-size:180px;font-weight:400;font-style:italic;
    color:var(--saffron);line-height:.9;margin-bottom:24px;
    letter-spacing:-.04em;
  }
  h1{
    font-family:'Cormorant Garamond',serif;
    font-size:36px;font-weight:400;color:var(--walnut);
    margin-bottom:18px;line-height:1.2;
  }
  h1 em{font-style:italic;color:var(--saffron-deep)}
  p{font-size:17px;color:var(--muted);margin-bottom:36px;max-width:440px;margin-left:auto;margin-right:auto}
  .btn{
    display:inline-block;padding:14px 34px;
    background:var(--saffron-deep);color:var(--cream);
    text-decoration:none;font-size:13px;letter-spacing:.18em;
    text-transform:uppercase;font-weight:600;
    transition:background .2s;
  }
  .btn:hover{background:var(--walnut)}
  footer{
    padding:24px;text-align:center;
    color:var(--muted);font-size:12px;
    letter-spacing:.12em;text-transform:uppercase;
    border-top:1px solid var(--line);
  }
  @media(max-width:640px){
    .code{font-size:130px}
    h1{font-size:28px}
    header{padding:22px 24px}
  }
</style>
</head>
<body>
<header>
  <a href="/">
    АПОЛЛОНІЯ
    <span class="tag">готель · Полтава · з 2009 року</span>
  </a>
</header>
<main>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Сторінку <em>не знайдено</em></h1>
    <p>Можливо, посилання застаріло або сторінка переїхала. Поверніться на головну.</p>
    <a class="btn" href="/">На головну</a>
  </div>
</main>
<footer>Готель «Аполлонія» · вул. О. Оксанченка, 29</footer>
</body>
</html>
